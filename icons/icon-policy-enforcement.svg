<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Main shield gradient (dark green bottom → bright green top) -->
    <linearGradient id="shieldMain" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%"   stop-color="#4EE04E"/>
      <stop offset="100%" stop-color="#1A8C1A"/>
    </linearGradient>
    <!-- Highlight gloss on upper-left -->
    <linearGradient id="shieldGloss" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Shield base -->
  <path d="M50 4 L87 19 L87 50 C87 73 71 89 50 97 C29 89 13 73 13 50 L13 19 Z"
        fill="url(#shieldMain)" filter="url(#shadow)"/>

  <!-- Inner darker border for depth -->
  <path d="M50 10 L82 23 L82 50 C82 70 68 85 50 92 C32 85 18 70 18 50 L18 23 Z"
        fill="none" stroke="#1A9E1A" stroke-width="1.5" opacity="0.5"/>

  <!-- Gloss highlight (upper-left area) -->
  <path d="M50 10 L82 23 L82 42 C70 38 55 30 30 23 L18 23 L18 42 C22 38 34 22 50 10 Z"
        fill="url(#shieldGloss)"/>

  <!-- White checkmark -->
  <polyline points="33,52 45,65 70,38"
            fill="none" stroke="white" stroke-width="8"
            stroke-linecap="round" stroke-linejoin="round"
            filter="url(#shadow)"/>
</svg>

