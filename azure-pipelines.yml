# ============================================================
# azure-pipelines.yml
# RHEL Patch Monitor Agent — CI/CD Pipeline
#
# Triggers automatically on any push to 'main' or 'develop'
# that touches files inside patch-monitor-agent/.
#
# Pipeline stages:
#   1. BUILD  — Build Docker image & push to ACR
#   2. DEPLOY — Update Azure Function App to use new image
#
# Required Azure DevOps setup (one-time):
#   - Variable group: "patch-monitor-vars" (see Variables section below)
#   - Service connection (Docker Registry): ACR_SERVICE_CONNECTION
#   - Service connection (Azure Resource Manager): AZURE_SERVICE_CONNECTION
# ============================================================

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - patch-monitor-agent/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - patch-monitor-agent/**

# ── Variables ───────────────────────────────────────────────
# Store sensitive values in a Variable Group named "patch-monitor-vars"
# in Azure DevOps → Pipelines → Library. Set these as secret variables:
#   ACR_NAME                  e.g. myregistry
#   IMAGE_NAME                e.g. rhel-patch-monitor
#   AZURE_FUNCTION_APP_NAME   e.g. rhel-patch-monitor-func
#   AZURE_RESOURCE_GROUP      e.g. rg-patch-monitor
#   ACR_SERVICE_CONNECTION    Docker Registry service connection name
#   AZURE_SERVICE_CONNECTION  Azure Resource Manager service connection name
variables:
  - group: patch-monitor-vars
  - name: IMAGE_REPOSITORY
    value: "$(ACR_NAME).azurecr.io/$(IMAGE_NAME)"
  - name: TAG
    value: "$(Build.BuildId)"
  - name: WORKING_DIR
    value: "patch-monitor-agent"

# ── Stages ──────────────────────────────────────────────────
stages:

  # ── Stage 1: BUILD ────────────────────────────────────────
  - stage: Build
    displayName: "Build & Push Docker Image"
    jobs:
      - job: BuildAndPush
        displayName: "Docker Build → ACR Push"
        pool:
          vmImage: ubuntu-latest

        steps:
          - checkout: self
            displayName: "Checkout source code"

          # Log in to ACR and build + push image
          - task: Docker@2
            displayName: "Build and push image to ACR"
            inputs:
              command: buildAndPush
              containerRegistry: "$(ACR_SERVICE_CONNECTION)"
              repository: "$(IMAGE_NAME)"
              dockerfile: "$(WORKING_DIR)/Dockerfile"
              buildContext: "$(WORKING_DIR)"
              tags: |
                $(TAG)
                latest

          # Publish the image tag as a pipeline artifact
          # so the Deploy stage can reference it
          - bash: echo "$(TAG)" > $(Build.ArtifactStagingDirectory)/image-tag.txt
            displayName: "Save image tag artifact"

          - task: PublishPipelineArtifact@1
            displayName: "Publish image tag artifact"
            inputs:
              targetPath: "$(Build.ArtifactStagingDirectory)/image-tag.txt"
              artifact: image-tag

  # ── Stage 2: DEPLOY ───────────────────────────────────────
  - stage: Deploy
    displayName: "Deploy to Azure Function App"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployFunction
        displayName: "Update Function App container image"
        pool:
          vmImage: ubuntu-latest
        environment: "production"

        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: image-tag
                  displayName: "Download image tag artifact"

                - bash: |
                    TAG=$(cat $(Pipeline.Workspace)/image-tag/image-tag.txt)
                    echo "Deploying image tag: $TAG"
                    echo "##vso[task.setvariable variable=DEPLOY_TAG]$TAG"
                  displayName: "Read image tag"

                # Update the Function App to use the new container image
                - task: AzureFunctionAppContainer@1
                  displayName: "Deploy container to Azure Function App"
                  inputs:
                    azureSubscription: "$(AZURE_SERVICE_CONNECTION)"
                    appName: "$(AZURE_FUNCTION_APP_NAME)"
                    resourceGroupName: "$(AZURE_RESOURCE_GROUP)"
                    imageName: "$(IMAGE_REPOSITORY):$(DEPLOY_TAG)"

                - bash: |
                    echo "=============================="
                    echo " Deployment complete"
                    echo " Image : $(IMAGE_REPOSITORY):$(DEPLOY_TAG)"
                    echo " App   : $(AZURE_FUNCTION_APP_NAME)"
                    echo "=============================="
                  displayName: "Deployment summary"
